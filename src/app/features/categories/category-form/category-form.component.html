<div class="cc-overlay">
  <div class="cc-backdrop" (click)="cancelled.emit()"></div>

  <div class="cc-modal-sm">
    <div class="kt-card" style="box-shadow: 0 20px 60px rgba(0,0,0,0.2)">

      <div class="kt-card-header">
        <div class="flex items-center gap-3">
          <div class="flex items-center justify-center rounded-lg bg-primary/10"
               style="width:40px;height:40px;flex-shrink:0">
            <i class="ki-filled ki-category text-primary text-lg"></i>
          </div>
          <div>
            <h3 class="kt-card-title">{{ isEditing ? 'Editar' : 'Nueva' }} Categoría</h3>
            <p class="kt-card-description">
              {{ isEditing ? 'Modifique los datos del registro' : 'Complete los campos para crear un nuevo registro' }}
            </p>
          </div>
        </div>
        <button (click)="cancelled.emit()" class="kt-btn kt-btn-sm kt-btn-icon kt-btn-ghost ms-auto">
          <i class="ki-filled ki-cross text-sm"></i>
        </button>
      </div>

      <div class="kt-card-content">
        @if (errorMessage()) {
          <div class="kt-alert kt-alert-destructive mb-4">
            <span class="kt-alert-icon"><i class="ki-filled ki-information-2"></i></span>
            <div class="kt-alert-content">{{ errorMessage() }}</div>
          </div>
        }

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="kt-form">

          <div class="kt-form-item">
            <label class="kt-form-label">
              Nombre <span class="text-destructive">*</span>
            </label>
            <input formControlName="name" type="text"
              placeholder="Nombre de la categoría"
              class="kt-input"
              [attr.aria-invalid]="hasError('name') ? 'true' : null" />
            <p class="kt-form-message">{{ getError('name') }}</p>
          </div>

          <div class="kt-form-item">
            <label class="kt-form-label">Descripción</label>
            <textarea formControlName="description" rows="3"
              placeholder="Descripción opcional de la categoría"
              class="kt-input" style="resize:none"
              [attr.aria-invalid]="hasError('description') ? 'true' : null"></textarea>
            <p class="kt-form-description">Máximo 255 caracteres</p>
            <p class="kt-form-message">{{ getError('description') }}</p>
          </div>

          <div class="kt-form-actions border-t border-border pt-4 mt-2">
            <button type="button" (click)="cancelled.emit()" class="kt-btn kt-btn-light">
              Cancelar
            </button>
            <button type="submit" class="kt-btn kt-btn-primary gap-2" [disabled]="isSubmitting()">
              @if (isSubmitting()) {
                <span class="cc-spinner"></span>
              } @else {
                <i class="ki-filled ki-check text-sm"></i>
              }
              {{ isEditing ? 'Actualizar' : 'Crear' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
