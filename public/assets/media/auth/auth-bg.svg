<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Background gradient: deep navy to dark slate -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1440" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0e1929"/>
    </linearGradient>

    <!-- Warm amber glow (bottom-right — bakery warmth) -->
    <radialGradient id="warmGlow" cx="1200" cy="750" r="650" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>

    <!-- Cool blue glow (top-left — tech / management) -->
    <radialGradient id="coolGlow" cx="220" cy="180" r="550" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="1.2" fill="#ffffff" opacity="0.07"/>
    </pattern>

    <!-- Diagonal line pattern (top-left triangle) -->
    <clipPath id="topLeftClip">
      <polygon points="0,0 480,0 0,480"/>
    </clipPath>
    <clipPath id="bottomRightClip">
      <polygon points="1440,960 960,960 1440,480"/>
    </clipPath>
  </defs>

  <!-- ── Base background ── -->
  <rect width="1440" height="960" fill="url(#bgGrad)"/>

  <!-- ── Ambient glows ── -->
  <rect width="1440" height="960" fill="url(#warmGlow)"/>
  <rect width="1440" height="960" fill="url(#coolGlow)"/>

  <!-- ── Dot grid ── -->
  <rect width="1440" height="960" fill="url(#dots)"/>

  <!-- ── Diagonal accent lines (top-left) ── -->
  <g clip-path="url(#topLeftClip)" opacity="0.06" stroke="#94a3b8" stroke-width="1" fill="none">
    <line x1="-100" y1="200" x2="200" y2="-100"/>
    <line x1="-100" y1="320" x2="320" y2="-100"/>
    <line x1="-100" y1="440" x2="440" y2="-100"/>
    <line x1="-100" y1="560" x2="560" y2="-100"/>
  </g>

  <!-- ── Diagonal accent lines (bottom-right) ── -->
  <g clip-path="url(#bottomRightClip)" opacity="0.06" stroke="#94a3b8" stroke-width="1" fill="none">
    <line x1="1300" y1="1060" x2="1540" y2="820"/>
    <line x1="1180" y1="1060" x2="1540" y2="700"/>
    <line x1="1060" y1="1060" x2="1540" y2="580"/>
    <line x1="940" y1="1060" x2="1540" y2="460"/>
  </g>

  <!-- ── Large decorative rings ── -->
  <circle cx="-40" cy="-40" r="320" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
  <circle cx="-40" cy="-40" r="480" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.03"/>
  <circle cx="1480" cy="1000" r="350" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
  <circle cx="1480" cy="1000" r="520" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.03"/>

  <!-- ══════════════════════════════════════════════════════════
       BAKERY ILLUSTRATIONS — outline style, warm amber/gold tones
       ════════════════════════════════════════════════════════ -->

  <!-- ── Croissant (top-right) ── -->
  <g transform="translate(1180, 80)" opacity="0.13" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10,70 C-15,30 20,-20 70,-10 C120,0 155,35 140,75 C125,115 80,120 50,110 C20,100 35,110 10,70Z"/>
    <path d="M25,60 C10,35 35,5 70,12 C105,19 125,45 115,70"/>
    <path d="M10,70 C25,55 45,50 60,58"/>
    <path d="M140,75 C128,68 115,68 108,75"/>
  </g>

  <!-- ── Layer cake (bottom-left) ── -->
  <g transform="translate(90, 680)" opacity="0.11" fill="none" stroke="#d97706" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bottom tier -->
    <rect x="0" y="70" width="130" height="42" rx="5"/>
    <!-- Middle tier -->
    <rect x="12" y="35" width="106" height="38" rx="5"/>
    <!-- Top tier -->
    <rect x="26" y="5" width="78" height="32" rx="5"/>
    <!-- Frosting drips -->
    <path d="M12,35 Q20,25 28,35 Q36,25 44,35 Q52,25 60,35 Q68,25 76,35 Q84,25 92,35 Q100,25 108,35 Q116,25 118,35"/>
    <!-- Candles -->
    <line x1="52" y1="5" x2="52" y2="-12"/>
    <line x1="73" y1="5" x2="73" y2="-12"/>
    <!-- Flames -->
    <path d="M49,-12 Q52,-20 55,-12" stroke="#f59e0b"/>
    <path d="M70,-12 Q73,-20 76,-12" stroke="#f59e0b"/>
  </g>

  <!-- ── Whisk (top-left corner) ── -->
  <g transform="translate(80, 100)" opacity="0.09" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round">
    <!-- Handle -->
    <line x1="90" y1="90" x2="140" y2="170"/>
    <!-- Head wires -->
    <path d="M45,30 Q60,70 90,90"/>
    <path d="M58,20 Q68,62 90,90"/>
    <path d="M72,18 Q76,60 90,90"/>
    <path d="M85,24 Q84,62 90,90"/>
    <path d="M97,30 Q93,65 90,90"/>
    <!-- Oval at top -->
    <ellipse cx="73" cy="38" rx="30" ry="22" transform="rotate(-15, 73, 38)"/>
  </g>

  <!-- ── Cupcake (right-center) ── -->
  <g transform="translate(1320, 420)" opacity="0.10" fill="none" stroke="#d97706" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Frosting -->
    <path d="M15,42 Q20,10 50,5 Q80,0 85,35 Q90,55 75,60 Q50,65 25,58 Q10,55 15,42Z"/>
    <path d="M25,42 Q30,20 50,18 Q70,16 73,38"/>
    <!-- Cherry on top -->
    <circle cx="50" cy="0" r="7" fill="#dc2626" stroke="#dc2626" opacity="0.6"/>
    <path d="M50,-7 Q55,-15 60,-12" stroke="#16a34a"/>
    <!-- Paper wrapper -->
    <path d="M10,68 L18,108 L82,108 L90,68"/>
    <!-- Wrapper ridges -->
    <line x1="22" y1="68" x2="18" y2="108"/>
    <line x1="50" y1="67" x2="50" y2="108"/>
    <line x1="78" y1="68" x2="82" y2="108"/>
  </g>

  <!-- ── Rolling pin (top-center) ── -->
  <g transform="translate(540, 38)" opacity="0.08" fill="none" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round">
    <!-- Main body -->
    <rect x="28" y="18" width="200" height="44" rx="22"/>
    <!-- Left handle -->
    <rect x="0" y="25" width="32" height="30" rx="8"/>
    <!-- Right handle -->
    <rect x="224" y="25" width="32" height="30" rx="8"/>
    <!-- Texture lines -->
    <line x1="78" y1="18" x2="78" y2="62"/>
    <line x1="120" y1="18" x2="120" y2="62"/>
    <line x1="162" y1="18" x2="162" y2="62"/>
  </g>

  <!-- ── Bread loaf (bottom-right) ── -->
  <g transform="translate(1260, 800)" opacity="0.11" fill="none" stroke="#d97706" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0,75 Q0,0 80,0 Q160,0 160,75 L155,100 L5,100 Z"/>
    <!-- Score marks -->
    <path d="M35,5 Q30,50 35,100"/>
    <path d="M80,0 Q80,50 80,100"/>
    <path d="M125,5 Q130,50 125,100"/>
    <!-- Shine -->
    <path d="M20,15 Q50,5 100,12" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- ── Recipe book / clipboard (left-center) ── -->
  <g transform="translate(55, 380)" opacity="0.08" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Book body -->
    <rect x="0" y="0" width="110" height="150" rx="6"/>
    <!-- Spine -->
    <line x1="18" y1="0" x2="18" y2="150"/>
    <!-- Page lines -->
    <line x1="30" y1="35" x2="95" y2="35"/>
    <line x1="30" y1="55" x2="95" y2="55"/>
    <line x1="30" y1="75" x2="78" y2="75"/>
    <!-- Mini bar chart on the page -->
    <rect x="30" y="100" width="12" height="30" rx="2" fill="#60a5fa" opacity="0.2"/>
    <rect x="48" y="88" width="12" height="42" rx="2" fill="#60a5fa" opacity="0.2"/>
    <rect x="66" y="95" width="12" height="35" rx="2" fill="#60a5fa" opacity="0.2"/>
    <rect x="84" y="80" width="12" height="50" rx="2" fill="#60a5fa" opacity="0.2"/>
  </g>

  <!-- ── Business bar chart (right side) ── -->
  <g transform="translate(1260, 280)" opacity="0.10">
    <!-- Bars -->
    <rect x="0" y="90" width="28" height="55" rx="4" fill="#3b82f6"/>
    <rect x="38" y="60" width="28" height="85" rx="4" fill="#3b82f6"/>
    <rect x="76" y="20" width="28" height="125" rx="4" fill="#60a5fa"/>
    <rect x="114" y="45" width="28" height="100" rx="4" fill="#3b82f6"/>
    <rect x="152" y="30" width="28" height="115" rx="4" fill="#60a5fa"/>
    <!-- Trend line -->
    <polyline points="14,85 52,55 90,15 128,40 166,25" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- X axis -->
    <line x1="-8" y1="145" x2="192" y2="145" stroke="#94a3b8" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- ── Sparkle / star accents ── -->
  <g fill="#f59e0b" opacity="0.18">
    <!-- Small 4-point star -->
    <path d="M720,55 L723,64 L732,67 L723,70 L720,79 L717,70 L708,67 L717,64Z" transform="scale(0.9)"/>
    <path d="M200,550 L202,556 L208,558 L202,560 L200,566 L198,560 L192,558 L198,556Z"/>
    <path d="M1380,180 L1382,186 L1388,188 L1382,190 L1380,196 L1378,190 L1372,188 L1378,186Z"/>
    <path d="M450,820 L452,826 L458,828 L452,830 L450,836 L448,830 L442,828 L448,826Z" opacity="0.12"/>
    <path d="M1050,110 L1052,114 L1056,116 L1052,118 L1050,122 L1048,118 L1044,116 L1048,114Z" opacity="0.14"/>
  </g>

  <!-- ── Ingredient/molecule dots (scattered) ── -->
  <g fill="#f59e0b" opacity="0.12">
    <circle cx="380" cy="140" r="3.5"/>
    <circle cx="395" cy="120" r="2.5"/>
    <circle cx="420" cy="145" r="2"/>
    <circle cx="1050" cy="820" r="3.5"/>
    <circle cx="1080" cy="800" r="2.5"/>
    <circle cx="1095" cy="830" r="2"/>
  </g>
  <g fill="#60a5fa" opacity="0.10">
    <circle cx="760" cy="880" r="3.5"/>
    <circle cx="790" cy="860" r="2.5"/>
    <circle cx="820" cy="875" r="2"/>
    <circle cx="680" cy="110" r="3"/>
    <circle cx="700" cy="90" r="2"/>
  </g>

  <!-- ── Thin horizontal line (brand / separator feel) ── -->
  <line x1="0" y1="960" x2="1440" y2="960" stroke="#ffffff" stroke-width="0" opacity="0"/>
</svg>
